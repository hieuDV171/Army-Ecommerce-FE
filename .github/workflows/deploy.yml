name: Deploy Backend to GCP VM

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.GCP_VM_HOST }}        # IP tĩnh của GCP VM
          username: ${{ secrets.GCP_VM_USER }}    # Username SSH (thường là ubuntu hoặc tên tài khoản)
          key: ${{ secrets.GCP_VM_SSH_KEY }}      # SSH Private Key để truy cập VM không cần mật khẩu
          port: 22
          script: |
            # 1. Đi vào thư mục chứa code dự án
            cd ~/Army-Ecommerce-FE/backend || {
              echo "Thư mục dự án chưa tồn tại, tiến hành clone..."
              git clone https://github.com/${{ github.repository }}.git ~/Army-Ecommerce-FE
              cd ~/Army-Ecommerce-FE/backend
            }
            
            # 2. Pull code mới nhất
            git pull origin main || git pull origin master
            
            # 3. Tạo file .env cho production nếu chưa có
            if [ ! -f .env ]; then
              echo "PORT=3000" > .env
              echo "DATABASE_URL=\"file:./dev.db\"" >> .env
              echo "JWT_SECRET=\"${{ secrets.JWT_SECRET }}\"" >> .env
              echo "JWT_EXPIRES_IN=\"7d\"" >> .env
              echo "BASE_URL=\"http://${{ secrets.GCP_VM_HOST }}:3000\"" >> .env
            fi
            
            # 4. Khởi chạy lại Docker Compose
            docker compose down
            docker compose up --build -d
            
            # 5. Chạy seed dữ liệu tự động bên trong Docker container
            docker exec army_ecommerce_backend npx ts-node src/seed.ts
            
            echo "🎉 Deploy thành công lên GCP VM!"
